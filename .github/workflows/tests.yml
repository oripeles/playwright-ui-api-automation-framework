name: Playwright UI Tests

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Playwright Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: playwright-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run SMOKE tests inside Docker
        run: |
          rm -rf allure-results traces
          mkdir -p allure-results traces
          docker run --rm \
            -e USER_PASSWORD="${{ secrets.USER_PASSWORD }}" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            -v "${{ github.workspace }}/traces:/app/traces" \
            playwright-tests \
            pytest -m smoke -n 4 --alluredir=/app/allure-results

      - name: Upload smoke allure results (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results
          retention-days: 7

      - name: Upload smoke trace (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-smoke
          path: traces
          retention-days: 7


  nightly-regression:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Playwright Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: playwright-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run REGRESSION tests inside Docker
        run: |
          rm -rf allure-results traces
          mkdir -p allure-results traces
          docker run --rm \
            -e USER_PASSWORD="${{ secrets.USER_PASSWORD }}" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            -v "${{ github.workspace }}/traces:/app/traces" \
            playwright-tests \
            pytest -m "not visual" -n 4 --reruns 3 --reruns-delay 1 --alluredir=/app/allure-results

      - name: Upload regression trace (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-regression
          path: traces
          retention-days: 7

      - name: Download previous Allure history into allure-results
        if: always()
        run: |
          mkdir -p allure-results/history
          PAGES_URL="https://oripeles.github.io/playwright-ui-api-automation-framework/history"
          curl -sSL "$PAGES_URL/history.json" -o /dev/null -w "%{http_code}" | grep -q 200 && \
          curl -sSL -o allure-results/history/history.json "$PAGES_URL/history.json" && \
          curl -sSL -o allure-results/history/history-trend.json "$PAGES_URL/history-trend.json" && \
          curl -sSL -o allure-results/history/duration-trend.json "$PAGES_URL/duration-trend.json" && \
          curl -sSL -o allure-results/history/categories-trend.json "$PAGES_URL/categories-trend.json" && \
          curl -sSL -o allure-results/history/retry-trend.json "$PAGES_URL/retry-trend.json" || \
          echo "No previous history found - first run"

      - name: Generate Allure HTML report
        if: always()
        run: |
          mkdir -p allure-report
          docker run --rm \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            -v "${{ github.workspace }}/allure-report:/app/allure-report" \
            playwright-tests \
            allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report


  deploy:
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: nightly-regression
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
