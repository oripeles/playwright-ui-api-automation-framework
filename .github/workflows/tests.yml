name: Playwright UI Tests

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Playwright Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: playwright-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run SMOKE tests inside Docker
        run: |
          rm -rf allure-results
          mkdir -p allure-results
          docker run --rm \
            -e USER_PASSWORD="${{ secrets.USER_PASSWORD }}" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            playwright-tests \
            pytest -m smoke -n 4 --alluredir=/app/allure-results

      - name: Upload smoke allure results (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results
          retention-days: 7


  nightly-regression:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Playwright Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: playwright-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run REGRESSION tests inside Docker
        run: |
          rm -rf allure-results
          mkdir -p allure-results
          docker run --rm \
            -e USER_PASSWORD="${{ secrets.USER_PASSWORD }}" \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            playwright-tests \
            pytest -n 4 --reruns 3 --reruns-delay 1 --alluredir=/app/allure-results

      - name: Generate Allure HTML report
        run: |
          mkdir -p allure-report
          docker run --rm \
            -v "${{ github.workspace }}/allure-results:/app/allure-results" \
            -v "${{ github.workspace }}/allure-report:/app/allure-report" \
            playwright-tests \
            allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report


  deploy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: nightly-regression
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
